name: CI

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"


jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format
        run: uv run ruff format --check src/ tests/

      - name: Typecheck
        run: uv run ty check src/iim/

      - name: Test
        run: uv run pytest tests/ -v
